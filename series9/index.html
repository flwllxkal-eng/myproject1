<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Scientific Calculator | Final Layout</title>
    <meta name="description" content="A scientific calculator with a corrected, intuitive layout and robust functionality, including fixes for function inputs.">
    <meta name="keywords" content="scientific calculator, online calculator, free calculator, math, engineering, layout fix">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Orbitron:wght@500&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div id="expression-display" class="expression-display" contenteditable="true" spellcheck="false">0</div>
            <div id="result-display" class="result-display" aria-live="polite">0</div>
        </div>
        
        <div class="buttons-grid">
            <!-- Functions -->
            <button class="btn func" data-key="sin">sin</button>
            <button class="btn func" data-key="cos">cos</button>
            <button class="btn func" data-key="tan">tan</button>
            <button class="btn func" data-key="log">log</button>
            <button class="btn func" data-key="ln">ln</button>

            <!-- Controls -->
            <button class="btn control" data-key="AC">AC</button>
            <button class="btn control" data-key="DEL">DEL</button>
            <button class="btn func" data-key="(">(</button>
            <button class="btn func" data-key=")">)</button>
            <button class="btn func" data-key="pi">π</button>

            <!-- Numbers -->
            <button class="btn number" data-key="7">7</button>
            <button class="btn number" data-key="8">8</button>
            <button class="btn number" data-key="9">9</button>
            
            <button class="btn number" data-key="4">4</button>
            <button class="btn number" data-key="5">5</button>
            <button class="btn number" data-key="6">6</button>

            <button class="btn number" data-key="1">1</button>
            <button class="btn number" data-key="2">2</button>
            <button class="btn number" data-key="3">3</button>

            <button class="btn number zero" data-key="0">0</button>
            <button class="btn dot" data-key=".">.</button>

            <!-- Operators and Equals -->
            <button class="btn operator" data-key="/">÷</button>
            <button class="btn operator" data-key="*">×</button>
            <button class="btn operator" data-key="-">−</button>
            <button class="btn operator" data-key="+">+</button>
            <button class="btn equals" data-key="=">=</button>

            <!-- Special Functions -->
            <button class="btn func" data-key="sqrt">√</button>
            <button class="btn func" data-key="sqr">x²</button>
            <button class="btn func" data-key="pow">xʸ</button>
            <button class="btn func" data-key="fact">x!</button>
            <button class="btn func" data-key="e">e</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
